<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INDUSTRY GIANTS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:#000;
color:white;
font-family:'Share Tech Mono',monospace;
}

/* CRT scanlines */

body:before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

/* headline */

.glitch{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:48px;
letter-spacing:8px;
text-align:center;
max-width:90vw;
line-height:1.3;
}

/* glitch layers */

.glitch:before,
.glitch:after{
content:attr(data-text);
position:absolute;
top:0;
left:0;
width:100%;
}

.glitch:before{
left:2px;
text-shadow:-2px 0 red;
clip-path:polygon(0 0,100% 0,100% 45%,0 45%);
animation:glitch1 2s infinite linear alternate-reverse;
}

.glitch:after{
left:-2px;
text-shadow:-2px 0 cyan;
clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);
animation:glitch2 2s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%{transform:translate(0)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(-2px,-2px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(0)}
}

@keyframes glitch2{
0%{transform:translate(0)}
25%{transform:translate(2px,-2px)}
50%{transform:translate(2px,2px)}
75%{transform:translate(-2px,-1px)}
100%{transform:translate(0)}
}

/* clues */

.clue{
position:absolute;
font-size:12px;
opacity:.04;
color:#aaa;
transition:.5s;
}

#c1{top:10%;left:6%}
#c2{top:75%;left:12%}
#c3{top:30%;right:8%}
#c4{bottom:8%;right:12%}
#c5{bottom:40%;left:3%}

/* ripcord */

#cord{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

#wire{
width:3px;
background:repeating-linear-gradient(
45deg,
#ddd,
#ddd 2px,
#777 2px,
#777 4px
);
}

#handle{
width:42px;
height:20px;
border:5px solid #ff2b2b;
border-radius:6px;
box-shadow:0 0 8px red,inset 0 0 6px red;
background:transparent;
}

/* signup */

#signup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

input{
background:#000;
border:1px solid #444;
color:white;
padding:10px;
font-family:inherit;
width:260px;
}

button{
background:#111;
border:1px solid #555;
color:white;
padding:10px 18px;
margin-left:6px;
cursor:pointer;
}

/* footer */

#footer{
position:absolute;
bottom:10px;
font-size:10px;
opacity:.25;
letter-spacing:3px;
}

/* mobile */

@media(max-width:768px){

.glitch{
font-size:7vw;
letter-spacing:2px;
width:90vw;
}

.clue{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="glitch" data-text="CLOSE YOUR EYES AND PULL THE RIPCORD">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

<div class="clue" id="c1">working so late on the corporate shift</div>
<div class="clue" id="c2">she cried all night</div>
<div class="clue" id="c3">it's a necessary torture</div>
<div class="clue" id="c4">no one coming to save you</div>
<div class="clue" id="c5">registry office</div>

<div id="cord">

<div id="wire"></div>

<div id="handle"></div>

</div>

<div id="signup">

<form action="https://formspree.io/f/xzdjpndk" method="POST">

<input type="email" name="email" placeholder="enter email" required>

<button>JOIN</button>

</form>

</div>

<div id="footer">
INDUSTRY GIANTS // IG-001
</div>

<audio id="track" loop>
<source src="ripcord_loop.mp3" type="audio/mpeg">
</audio>

<script>

/* physics drop */

const handle=document.getElementById("handle")
const wire=document.getElementById("wire")
const cord=document.getElementById("cord")

let y=-120
let velocity=0
const target=window.innerHeight*0.48

function drop(){

velocity+=(target-y)*0.06
velocity*=0.82
y+=velocity

handle.style.transform=`translateY(${y}px)`
wire.style.height=(y+5)+"px"

requestAnimationFrame(drop)

}

drop()

/* drag interaction */

let dragging=false
let startY=0

handle.addEventListener("touchstart",e=>{
dragging=true
startY=e.touches[0].clientY
})

window.addEventListener("touchmove",e=>{

if(!dragging)return

let current=e.touches[0].clientY
let diff=current-startY

if(diff>0){

y+=diff*0.4

handle.style.transform=`translateY(${y}px)`
wire.style.height=(y+5)+"px"

startY=current

}

})

window.addEventListener("touchend",()=>{

if(!dragging)return
dragging=false
activate()

})

/* desktop click */

cord.onclick=activate

/* activation */

const audio=document.getElementById("track")
const signup=document.getElementById("signup")
const glitch=document.querySelector(".glitch")

function activate(){

glitch.style.display="none"

signup.style.display="block"

audio.volume=0
audio.play()

let start=null

function fade(ts){

if(!start)start=ts

let p=(ts-start)/3000

audio.volume=Math.min(p*.5,.5)

if(p<1)requestAnimationFrame(fade)

}

requestAnimationFrame(fade)

/* cord flies upward */

let vy=-25

function fly(){

y+=vy
vy+=1.2

handle.style.transform=`translateY(${y}px)`
wire.style.height=Math.max(0,y)+"px"

if(y<window.innerHeight+200)
requestAnimationFrame(fly)

}

fly()

startClues()

}

/* clue sequence */

const clues=document.querySelectorAll(".clue")

function startClues(){

let i=0

function show(){

clues.forEach(c=>{
c.style.opacity=".05"
})

let c=clues[i]

c.style.opacity=".9"
c.style.textShadow="0 0 10px red"

i=(i+1)%clues.length

setTimeout(show,1500)

}

show()

}

</script>

</body>
</html>
