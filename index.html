<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>pull the ripcord</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
max-width:100vw;
height:100%;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
overflow-x:hidden;
}

#container{
position:relative;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.glitch{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:48px;
letter-spacing:8px;
text-align:center;
max-width:90vw;
white-space:normal;
line-height:1.4;
}

.glitch span{
display:block;
}

#ripcord{
position:absolute;
top:-200px;
left:50%;
transform:translateX(-50%);
font-size:40px;
cursor:pointer;
user-select:none;
transition:top .9s cubic-bezier(.25,.8,.25,1);
}

#ripcord.pulled{
top:44%;
}

#cryptic{
position:absolute;
bottom:12%;
left:50%;
transform:translateX(-50%);
font-size:12px;
letter-spacing:4px;
opacity:.05;
pointer-events:none;
width:90%;
max-width:700px;
line-height:1.8;
}

.cryptic-line{
opacity:0;
transition:opacity 1s;
}

.cryptic-line.visible{
opacity:.2;
}

@media screen and (max-width:768px){

.glitch{
font-size:7vw;
letter-spacing:2px;
width:90vw;
top:46%;
}

#ripcord{
font-size:34px;
}

#ripcord.pulled{
top:47%;
}

}

</style>
</head>


<body>

<div id="container">

<div class="glitch">

<span>CLOSE YOUR EYES</span>
<span>AND PULL THE RIPCORD</span>

</div>


<div id="ripcord">⬇</div>


<div id="cryptic">

<div class="cryptic-line">signal buried under static</div>
<div class="cryptic-line">transmission begins when silence breaks</div>
<div class="cryptic-line">the cord was always there</div>
<div class="cryptic-line">did you choose or did it choose you</div>
<div class="cryptic-line">nothing happens until it does</div>

</div>

</div>


<script>

const ripcord=document.getElementById("ripcord")
const lines=document.querySelectorAll(".cryptic-line")

let running=false

ripcord.onclick=()=>{

if(running) return

running=true
ripcord.classList.add("pulled")

let i=0

setInterval(()=>{

lines.forEach(l=>l.classList.remove("visible"))

lines[i].classList.add("visible")

i++

if(i>=lines.length) i=0

},1500)

}

</script>


</body>
</html>
