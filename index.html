<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Industry Giants</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:monospace;
overflow:hidden;
}

/* scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

/* center message */

.center{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* glitch */

.glitch{
font-size:2rem;
letter-spacing:4px;
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
width:100%;
opacity:.7;
}

.glitch::before{
color:red;
animation:g1 1s infinite;
}

.glitch::after{
color:cyan;
animation:g2 1s infinite;
}

@keyframes g1{
0%{transform:translate(2px,0)}
50%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}

@keyframes g2{
0%{transform:translate(-2px,0)}
50%{transform:translate(2px,-2px)}
100%{transform:translate(0,0)}
}

/* ripcord container */

#ripcord{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
}

/* blinds */

#blind{
position:fixed;
top:-100%;
left:0;
width:100%;
height:100%;
background:black;
transition:top 1s ease;
z-index:10;
}

/* signup */

#signup{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:11;
}

input{
padding:12px;
background:black;
border:1px solid white;
color:white;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<div class="center">
<div class="glitch" data-text="CLOSE YOUR EYES AND PULL THE RIPCORD">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>
</div>

<!-- RIPCORD -->

<svg id="ripcord" width="120" height="500">

<!-- cord -->

<line
id="cord"
x1="60"
y1="0"
x2="60"
y2="200"
stroke="url(#cordPattern)"
stroke-width="6"
/>

<!-- T HANDLE -->

<g id="handle" transform="translate(60,200)" style="cursor:grab">

<rect x="-35" y="-6" width="70" height="12" rx="4" fill="#d40000"/>

<rect x="-10" y="-6" width="20" height="35" rx="4" fill="#b00000"/>

</g>

<!-- braided cord pattern -->

<defs>

<linearGradient id="cordPattern" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#ff3030"/>
<stop offset="50%" stop-color="#aa0000"/>
<stop offset="100%" stop-color="#ff3030"/>
</linearGradient>

</defs>

</svg>

<div id="blind"></div>

<div id="signup">

<h2>INDUSTRY GIANTS</h2>

<p>Enter your email</p>

<form action="https://formspree.io/f/YOURID" method="POST">
<input type="email" name="email" placeholder="email address" required>
<button>JOIN</button>
</form>

</div>

<script>

const handle=document.getElementById("handle")
const cord=document.getElementById("cord")
const blind=document.getElementById("blind")
const signup=document.getElementById("signup")

let startY
let pulling=false
let base=200
let maxPull=180

function start(e){
pulling=true
startY=(e.touches?e.touches[0].clientY:e.clientY)
}

function move(e){

if(!pulling)return

let y=(e.touches?e.touches[0].clientY:e.clientY)
let diff=y-startY

if(diff<0) diff=0
if(diff>maxPull) diff=maxPull

let newY=base+diff

handle.setAttribute("transform","translate(60,"+newY+")")

cord.setAttribute("y2",newY)

}

function end(){

if(!pulling) return

pulling=false

let y=handle.transform.baseVal.getItem(0).matrix.f

if(y>base+150){

blind.style.top="0"

setTimeout(()=>{
signup.style.display="block"
},900)

}else{

handle.setAttribute("transform","translate(60,"+base+")")
cord.setAttribute("y2",base)

}

}

handle.addEventListener("mousedown",start)
document.addEventListener("mousemove",move)
document.addEventListener("mouseup",end)

handle.addEventListener("touchstart",start)
document.addEventListener("touchmove",move)
document.addEventListener("touchend",end)

</script>

</body>
</html>
