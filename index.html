<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pull The Ripcord</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial,Helvetica,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* scanline effect */

body::after{
content:"";
position:absolute;
inset:0;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.04) 0px,
rgba(255,255,255,0.04) 2px,
transparent 2px,
transparent 4px
);
pointer-events:none;
}

/* stage */

.stage{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* cord */

.cord{
position:absolute;
top:-200px;
width:3px;
height:200px;
background:#ddd;
transition:top 1.2s ease;
}

/* handle */

.handle{
position:absolute;
top:-20px;
width:min(220px,40vw);
cursor:pointer;
transition:transform .2s;
}

.handle svg{
width:100%;
filter:drop-shadow(0 6px 10px rgba(0,0,0,.6));
}

/* jiggle */

@keyframes jiggle{
0%{transform:rotate(0)}
25%{transform:rotate(2deg)}
50%{transform:rotate(-2deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}
}

.jiggle{
animation:jiggle .4s infinite;
}

/* text */

.text{
opacity:0;
margin-top:200px;
font-size:min(56px,8vw);
letter-spacing:.15em;
text-align:center;
text-transform:uppercase;
transition:opacity 1s;
}

.glitch{
text-shadow:
-2px 0 red,
2px 0 cyan;
}

/* signup */

.signup{
position:absolute;
opacity:0;
transition:opacity 1s;
text-align:center;
}

.signup h2{
font-weight:normal;
margin-bottom:20px;
}

input{
padding:14px;
font-size:16px;
border:none;
border-radius:4px;
width:220px;
}

button{
padding:14px 20px;
background:red;
color:white;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="stage">

<div class="cord" id="cord"></div>

<div class="handle" id="handle">
<svg viewBox="0 0 300 160">
<defs>
<linearGradient id="redtube" x1="0" x2="1">
<stop offset="0%" stop-color="#ff4444"/>
<stop offset="50%" stop-color="#cc0000"/>
<stop offset="100%" stop-color="#ff4444"/>
</linearGradient>
</defs>

<path d="
M30 40
Q30 10 60 10
H240
Q270 10 270 40
Q270 70 240 70
H180
V120
Q180 150 150 150
Q120 150 120 120
V70
H60
Q30 70 30 40
Z"
fill="url(#redtube)"
stroke="#880000"
stroke-width="6"/>
</svg>
</div>

<div class="text glitch" id="text">
CLOSE YOUR EYES AND PULL<br>
THE RIPCORD
</div>

<div class="signup" id="signup">

<h2>
You pulled the ripcord.<br>
Enter your email for your unique ID.
</h2>

<form action="https://formspree.io/f/xzdjpndk" method="POST">
<input type="email" name="email" placeholder="email address" required>
<button>JOIN</button>
</form>

</div>

<audio id="song" loop>
<source src="sample.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const cord=document.getElementById("cord")
const handle=document.getElementById("handle")
const text=document.getElementById("text")
const signup=document.getElementById("signup")
const song=document.getElementById("song")

let pulled=false

/* descend animation */

setTimeout(()=>{
cord.style.top="0"
handle.style.top="180px"
},200)

/* show text */

setTimeout(()=>{
text.style.opacity=1
},1400)

/* idle jiggle */

setTimeout(()=>{
handle.classList.add("jiggle")
},3500)

/* pull action */

handle.addEventListener("click",()=>{

if(pulled) return
pulled=true

handle.classList.remove("jiggle")

/* cord snap upward */

cord.style.top="-200px"
handle.style.top="-60px"

/* fade music to 50% */

song.volume=0
song.play()

let fade=setInterval(()=>{
if(song.volume<0.5){
song.volume+=0.02
}else{
clearInterval(fade)
}
},120)

/* transition to signup */

setTimeout(()=>{
text.style.opacity=0
signup.style.opacity=1
},1000)

})

</script>

</body>
</html>
