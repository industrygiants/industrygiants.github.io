<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Giants</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* CRT scanlines */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.04),
rgba(255,255,255,0.04) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
}

#container{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* TEXT */

#text{
font-size:clamp(24px,4vw,48px);
letter-spacing:4px;
opacity:0;
transition:opacity 1s;
text-shadow:2px 0 red,-2px 0 cyan;
}

/* RIPCORD */

#cord{
position:absolute;
top:-320px;
display:flex;
flex-direction:column;
align-items:center;
}

#wire{
width:4px;
height:220px;
background:linear-gradient(#ddd,#999);
}

#handle{
width:150px;
height:90px;
border-radius:50px;
border:14px solid #b30000;
border-bottom:40px solid #b30000;
background:linear-gradient(#ff3a3a,#b30000);
cursor:pointer;
box-shadow:
inset 0 0 10px rgba(0,0,0,.6),
0 0 10px rgba(255,0,0,.7);
}

.jiggle{
animation:jiggle 1.2s infinite;
}

@keyframes jiggle{
0%{transform:translateY(0)}
50%{transform:translateY(10px)}
100%{transform:translateY(0)}
}

/* SIGNUP */

#signup{
position:absolute;
opacity:0;
transition:opacity 1.4s;
}

input{
padding:12px;
font-size:16px;
border:none;
border-radius:6px;
margin-right:6px;
}

button{
padding:12px 18px;
font-size:16px;
background:red;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

#message{
font-size:22px;
margin-bottom:15px;
}

</style>
</head>

<body>

<div id="container">

<div id="cord">
<div id="wire"></div>
<div id="handle"></div>
</div>

<div id="text">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

<div id="signup">

<div id="message">
You pulled the ripcord.<br>
Enter your email for your unique ID.
</div>

<form id="fanForm" action="https://formspree.io/f/xzdjpndk" method="POST">

<input type="hidden" name="fan_id" id="fanID">

<input type="email" name="email" placeholder="email address" required>

<button type="submit">JOIN</button>

</form>

</div>

</div>

<audio id="track" loop>
<source src="sample.mp3" type="audio/mpeg">
</audio>

<script>

const cord = document.getElementById("cord")
const handle = document.getElementById("handle")
const text = document.getElementById("text")
const signup = document.getElementById("signup")
const audio = document.getElementById("track")

let pulled = false
let startY = 0
let currentPull = 0

/* DESCEND FROM CEILING */

function descend(){

cord.style.transition = "top 2s ease"
cord.style.top = "120px"

setTimeout(()=>{
text.style.opacity = 1
},2000)

setTimeout(()=>{
handle.classList.add("jiggle")
},4500)

}

window.onload = descend

/* DRAG INTERACTION */

handle.addEventListener("mousedown",startPull)
handle.addEventListener("touchstart",startPull)

function startPull(e){

if(pulled) return

handle.classList.remove("jiggle")

startY = e.touches ? e.touches[0].clientY : e.clientY

document.addEventListener("mousemove",pullMove)
document.addEventListener("touchmove",pullMove)

document.addEventListener("mouseup",releasePull)
document.addEventListener("touchend",releasePull)

}

function pullMove(e){

let y = e.touches ? e.touches[0].clientY : e.clientY
currentPull = y - startY

if(currentPull < 0) currentPull = 0
if(currentPull > 180) currentPull = 180

cord.style.transform = `translateY(${currentPull}px)`

}

function releasePull(){

document.removeEventListener("mousemove",pullMove)
document.removeEventListener("touchmove",pullMove)

document.removeEventListener("mouseup",releasePull)
document.removeEventListener("touchend",releasePull)

if(currentPull > 120){
triggerRipcord()
}else{
cord.style.transform = "translateY(0)"
}

}

/* SNAP UPWARD */

function triggerRipcord(){

pulled = true

cord.style.transition = "transform .6s ease, top .8s ease"
cord.style.transform = "translateY(-450px)"
cord.style.top = "-450px"

fadeAudio()

setTimeout(()=>{
text.style.opacity = 0
signup.style.opacity = 1
generateID()
},1400)

}

/* AUDIO FADE */

function fadeAudio(){

audio.volume = 0
audio.play()

let v = 0

let fade = setInterval(()=>{

v += 0.02
audio.volume = v

if(v >= 0.5){
audio.volume = 0.5
clearInterval(fade)
}

},120)

}

/* ID SYSTEM */

async function generateID(){

const res = await fetch("https://api.countapi.xyz/hit/industry-giants/ripcord")
const data = await res.json()

const id = "IG-" + String(data.value).padStart(3,"0")

document.getElementById("fanID").value = id

}

</script>

</body>
</html>
