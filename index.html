<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDUSTRY GIANTS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- FAVICONS -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
  height:100vh;
  transition: background 1s linear;
}

/* scanlines */
body:before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,.03),
    rgba(255,255,255,.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* glitch text */
.glitch{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:48px;
  letter-spacing:8px;
  text-align:center;
  white-space:nowrap;
}

/* glitch layers */
.glitch:before,
.glitch:after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  overflow:hidden;
}
.glitch:before{
  left:2px;
  text-shadow:-2px 0 red;
  clip-path:polygon(0 0,100% 0,100% 45%,0 45%);
  animation:glitch1 2s infinite linear alternate-reverse;
}
.glitch:after{
  left:-2px;
  text-shadow:-2px 0 cyan;
  clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);
  animation:glitch2 2s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(-2px,-2px)}
60%{transform:translate(2px,2px)}
80%{transform:translate(1px,-1px)}
100%{transform:translate(0)}
}
@keyframes glitch2{
0%{transform:translate(0)}
20%{transform:translate(2px,-2px)}
40%{transform:translate(2px,2px)}
60%{transform:translate(-2px,-1px)}
80%{transform:translate(1px,2px)}
100%{transform:translate(0)}
}

/* hidden lyric fragments */
.clue{
  position:absolute;
  font-size:11px;
  opacity:.18;
  color:#aaa;
  transition:text-shadow 0.3s ease-in-out, color 0.3s ease-in-out;
}
#c1{top:12%;left:6%}
#c2{top:78%;left:12%}
#c3{top:32%;right:8%}
#c4{bottom:8%;right:12%}
#c5{bottom:40%;left:3%}

/* ripcord container */
#cord{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* wire */
#wire{
  width:3px;
  background:repeating-linear-gradient(
    45deg,
    #dcdcdc,
    #dcdcdc 2px,
    #888 2px,
    #888 4px
  );
}

/* handle wrapper */
#handle-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  position:absolute;
  top:-100px; /* start off screen */
  transition:top 1.4s cubic-bezier(.22,.61,.36,1);
}

/* simple pulley handle */
#handle{
  width:40px;
  height:20px;
  border:5px solid #ff2b2b;
  border-radius:6px;
  background:transparent;
  box-shadow: inset 0 0 5px rgba(255,0,0,.4),0 0 6px rgba(255,0,0,.6);
}

/* email capture */
#signup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  text-align:center;
}
input{
  background:#000;
  border:1px solid #444;
  color:#fff;
  padding:10px;
  font-family:inherit;
  width:260px;
}
button{
  background:#111;
  border:1px solid #555;
  color:#fff;
  padding:10px 20px;
  margin-left:6px;
  cursor:pointer;
}

/* footer */
#footer{
  position:absolute;
  bottom:12px;
  font-size:10px;
  opacity:.25;
  letter-spacing:3px;
}
</style>
</head>
<body>

<div class="glitch" data-text="CLOSE YOUR EYES AND PULL THE RIPCORD">
CLOSE YOUR EYES AND PULL THE RIPCORD
</div>

<div class="clue" id="c1">working so late on the corporate shift</div>
<div class="clue" id="c2">she cried all night</div>
<div class="clue" id="c3">it’s a necessary torture</div>
<div class="clue" id="c4">no one coming to save you</div>
<div class="clue" id="c5">registry office</div>

<div id="cord">
  <div id="wire"></div>
  <div id="handle-wrapper">
    <div id="handle"></div>
  </div>
</div>

<div id="signup">
<form action="https://formspree.io/f/xzdjpndk" method="POST">
<input type="email" name="email" placeholder="enter email" required>
<button>JOIN</button>
</form>
</div>

<div id="footer">
INDUSTRY GIANTS // IG-001
</div>

<audio id="track" loop>
<source src="ripcord_loop.mp3" type="audio/mpeg">
</audio>

<script>
const handleWrapper = document.getElementById("handle-wrapper");
const cord = document.getElementById("cord");
const audio = document.getElementById("track");
const wire = document.getElementById("wire");
const clues = document.querySelectorAll(".clue");
const signup = document.getElementById("signup");
const glitch = document.querySelector(".glitch");

// detect mobile
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// MOBILE OPTIMIZATION
if(isMobile){
  glitch.style.fontSize = "24px";
  glitch.style.letterSpacing = "2px";
  glitch.style.top = "45%";
  clues.forEach(c=>{
    c.style.fontSize="10px";
    c.style.left="5%";
    c.style.right="5%";
  });
  document.getElementById("c1").style.top="5%";
  document.getElementById("c2").style.top="65%";
  document.getElementById("c3").style.top="25%";
  document.getElementById("c4").style.top="50%";
  document.getElementById("c5").style.top="40%";
}

// initial drop
setTimeout(()=>{
  handleWrapper.style.top="40vh";
  wire.style.height="40vh";
},100);

// animate wire height continuously to follow handle
function updateWire(){
  const handleRect = handleWrapper.getBoundingClientRect();
  wire.style.height = handleRect.top + "px";
  requestAnimationFrame(updateWire);
}
requestAnimationFrame(updateWire);

// click to retract, start audio and effects
cord.onclick = ()=>{
  glitch.style.display="none";
  setTimeout(()=>{signup.style.display="block"},500);

  // retract handle
  handleWrapper.style.transition="top 0.8s ease-in";
  handleWrapper.style.top="-150px"; // off top of screen

  // audio fade in
  audio.volume = 0;
  audio.play().catch(e=>console.log(e));
  const targetVol = 0.5;
  const fadeDur = 3000;
  let start=null;
  function fadeIn(ts){
    if(!start) start=ts;
    const prog=ts-start;
    audio.volume=Math.min(prog/fadeDur*targetVol,targetVol);
    if(prog<fadeDur) requestAnimationFrame(fadeIn);
    else audio.volume=targetVol;
  }
  requestAnimationFrame(fadeIn);

  // glow clues individually
  let index=0;
  function pulseClues(){
    clues.forEach(c=>{
      c.style.color="#aaa";
      c.style.textShadow="";
      c.style.opacity=".18";
    });
    const clue = clues[index];
    let t0=null;
    function pulse(ts){
      if(!t0) t0=ts;
      const sine = (Math.sin((ts-t0)/600)+1)/2; // ~1.2s cycle
      const r = Math.floor(255*sine + 100);
      const g = Math.floor(255*sine + 100);
      const b = Math.floor(255*sine + 100);
      clue.style.color=`rgb(${r},${g},${b})`;
      clue.style.textShadow=`0 0 ${4+10*sine}px red, 0 0 ${8+10*sine}px red`;
      clue.style.opacity = 0.9;
      requestAnimationFrame(pulse);
    }
    requestAnimationFrame(pulse);
    index = (index+1)%clues.length;
    setTimeout(pulseClues,1200);
  }
  pulseClues();

  // dark blue background pulsation
  let startBG=null;
  function animateBG(ts){
    if(!startBG) startBG=ts;
    const t=(ts-startBG)/1000;
    const sine=Math.sin(t*0.3);
    const b = 8 + 3*((sine+1)/2); // darker blue
    document.body.style.backgroundColor=`rgb(0,0,${b})`;
    requestAnimationFrame(animateBG);
  }
  requestAnimationFrame(animateBG);
};
</script>
</body>
</html>
