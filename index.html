<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INDUSTRY GIANTS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<style>

html,body{
margin:0;
padding:0;
height:100%;
width:100%;
max-width:100vw;
overflow-x:hidden;
overflow-y:hidden;
background:#050505;
color:#e6e6e6;
font-family:'Share Tech Mono',monospace;
}

/* scanlines */

body:before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,.02),
rgba(255,255,255,.02) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

/* headline */

.glitch{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:48px;
letter-spacing:8px;
text-align:center;
max-width:90vw;
line-height:1.35;

/* solid hazard yellow */
color:#FFD700;

animation:signalglitch 9s infinite;
}

.glitch span{
display:block;
}

/* subtle signal movement only (no color change) */

@keyframes signalglitch{

0%{transform:translate(-50%,-50%)}
92%{transform:translate(-50%,-50%)}

93%{
transform:translate(calc(-50% + 2px),calc(-50% - 1px));
}

94%{
transform:translate(calc(-50% - 2px),calc(-50% + 1px));
}

95%{
transform:translate(-50%,-50%);
}

96%{
transform:translate(calc(-50% + 1px),calc(-50% + 2px));
}

97%{
transform:translate(-50%,-50%);
}

100%{transform:translate(-50%,-50%)}

}

/* clues */

.clue{
position:absolute;
font-size:11px;
opacity:.035;
color:#8a8a8a;
transition:.3s;
max-width:70vw;
}

#c1{top:12%;left:6%}
#c2{top:78%;left:12%}
#c3{top:32%;right:8%}
#c4{bottom:8%;right:12%}
#c5{bottom:40%;left:3%}

/* ripcord */

#cord{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
z-index:20;
}

#wire{
width:3px;
background:linear-gradient(
90deg,
#6a6a6a,
#cfcfcf,
#6a6a6a
);
}

#handle-wrapper{
position:absolute;
top:-120px;
transition:top 1.4s cubic-bezier(.22,.61,.36,1);
}

#handle{
width:40px;
height:20px;
border:5px solid #e23a3a;
border-radius:6px;
background:transparent;
box-shadow:
0 0 6px rgba(226,58,58,.7),
inset 0 0 6px rgba(226,58,58,.6);
}

/* signup */

#signup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
text-align:center;
}

input{
background:#050505;
border:1px solid #444;
color:#e6e6e6;
padding:10px;
font-family:inherit;
width:260px;
}

button{
background:#111;
border:1px solid #555;
color:#e6e6e6;
padding:10px 18px;
margin-left:6px;
cursor:pointer;
}

/* footer */

#footer{
position:absolute;
bottom:10px;
font-size:10px;
opacity:.25;
letter-spacing:3px;
}

/* MOBILE */

@media screen and (max-width:768px){

.glitch{
font-size:7vw;
letter-spacing:2px;
width:90vw;
line-height:1.45;
top:42%;
}

.clue{
font-size:14px;
}

#c1{top:8%;left:6%}
#c2{top:24%;left:10%}
#c3{top:64%;right:8%}
#c4{bottom:18%;right:8%}
#c5{bottom:10%;left:8%}

#handle{
width:48px;
height:24px;
}

#wire{
width:4px;
}

input{
width:65%;
font-size:16px;
}

button{
font-size:16px;
}

#footer{
font-size:9px;
bottom:6px;
}

}

</style>
</head>

<body>

<div class="glitch">
<span>CLOSE YOUR EYES</span>
<span>AND PULL THE RIPCORD</span>
</div>

<div class="clue" id="c1">working so late on the corporate shift</div>
<div class="clue" id="c2">she cried all night</div>
<div class="clue" id="c3">it's a necessary torture</div>
<div class="clue" id="c4">no one coming to save you</div>
<div class="clue" id="c5">registry office</div>

<div id="cord">
<div id="wire"></div>
<div id="handle-wrapper">
<div id="handle"></div>
</div>
</div>

<div id="signup">
<form action="https://formspree.io/f/xzdjpndk" method="POST">
<input type="email" name="email" placeholder="enter email" required>
<button>JOIN</button>
</form>
</div>

<div id="footer">
INDUSTRY GIANTS // IG-001
</div>

<audio id="track" loop>
<source src="ripcord_loop.mp3" type="audio/mpeg">
</audio>

<script>

const handleWrapper=document.getElementById("handle-wrapper");
const cord=document.getElementById("cord");
const wire=document.getElementById("wire");
const audio=document.getElementById("track");
const clues=document.querySelectorAll(".clue");
const signup=document.getElementById("signup");
const glitch=document.querySelector(".glitch");

setTimeout(()=>{
handleWrapper.style.top="46vh";
wire.style.height="46vh";
},100);

function updateWire(){
const rect=handleWrapper.getBoundingClientRect();
wire.style.height=rect.top+"px";
requestAnimationFrame(updateWire);
}
updateWire();

cord.onclick=()=>{

glitch.style.display="none";
setTimeout(()=>signup.style.display="block",400);

handleWrapper.style.transition="top .8s ease-in";
handleWrapper.style.top="-150px";

audio.volume=0;
audio.play();

let start=null;

function fade(ts){
if(!start)start=ts;
let p=(ts-start)/3000;
audio.volume=Math.min(p*.5,.5);
if(p<1)requestAnimationFrame(fade);
}

requestAnimationFrame(fade);

let i=0;

function glow(){

clues.forEach(c=>{
c.style.opacity=".035";
c.style.textShadow="";
});

const clue=clues[i];

let t0=null;

function pulse(ts){
if(!t0)t0=ts;

let s=(Math.sin((ts-t0)/600)+1)/2;

let yellow=`rgba(255,215,0,${s})`;
let white=`rgba(255,255,255,${1-s})`;

clue.style.opacity=.9;
clue.style.textShadow=`0 0 ${12*s}px ${yellow}, 0 0 ${6*(1-s)}px ${white}`;

requestAnimationFrame(pulse);
}

pulse();

i=(i+1)%clues.length;

setTimeout(glow,1500);

}

glow();

};

</script>

</body>
</html>
